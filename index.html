<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>OJT Progress Tracker</h1>

        <!-- Summary Dashboard -->
        <div class="summary">

            <div class="summary-card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="summary-card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>

            <div class="summary-card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>

        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <h3>Progress</h3>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill">
                    0%
                </div>
            </div>
        </div>

        <!-- Search -->
        <input
            type="text"
            id="searchTask"
            placeholder="Search Tasks..."
            onkeyup="displayTasks()"
        >

        <!-- Task Form -->
        <form id="taskForm">

            <input
                type="text"
                id="title"
                placeholder="Enter Task Title"
                required
            >

            <input
                type="date"
                id="date"
                required
            >

            <label><strong>Technologies Used:</strong></label>

            <div class="checkbox-group">

                <label>
                    <input type="checkbox" value="HTML" class="tech">
                    HTML
                </label>

                <label>
                    <input type="checkbox" value="CSS" class="tech">
                    CSS
                </label>

                <label>
                    <input type="checkbox" value="JavaScript" class="tech">
                    JavaScript
                </label>

                <label>
                    <input type="checkbox" value="Java" class="tech">
                    Java
                </label>

                <label>
                    <input type="checkbox" value="Git" class="tech">
                    Git
                </label>

                <label>
                    <input type="checkbox" value="GitHub" class="tech">
                    GitHub
                </label>

            </div>

            <select id="status" required>

                <option value="Pending">
                    Pending
                </option>

                <option value="In Progress">
                    In Progress
                </option>

                <option value="Complete">
                    Complete
                </option>

            </select>

            <textarea
                id="notes"
                placeholder="Enter errors, learnings or mentor feedback"
            ></textarea>

            <button type="submit">
                Add Task
            </button>

        </form>

        <!-- Task List -->
        <div id="taskList"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
